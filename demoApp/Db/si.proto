# Stream Protocol file for simpleInstrument.py

Terminator = CR LF;
InTerminator = CR LF;
ReplyTimeout = 10000;
ReadTimeout = 10000;

getID
{
  out "*IDN?"; 
  in "%#s";
}

getOn # for electron gun
{
  out "BEAM?";
  in "%d";
}

setOn
{
  out "BEAM %s"; # TODO need to refactor so the 0/1 that is returned becomes a ON and OFF
  @init
  {
    getOn;
  }
}

setHcorr
{
  out "HCORR %f"; 
}

setVcorr
{
  out "VCORR %f"; 
}

bpmx0
{
  out "BUTTONS?"; 
  in "%f,%*f,%*f,%*f";
}

bpmx1
{
  in "%*f,%f,%*f,%*f";
}

bpmy0
{
  in "%*f,%*f,%f,%*f";
}

bpmy1
{
  in "%*f,%*f,%*f,%f";
}
